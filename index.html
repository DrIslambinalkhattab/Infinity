<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>معاينة الفاتورة</title>

  <!-- استدعاء مكتبة مايكروسوفت الرسمية للربط مع الإكسيل -->
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js" type="text/javascript"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

  <style>
    /* الإبقاء على كافة التنسيقات الخاصة بك كما هي دون تغيير */
    :root{
      --font-main:'Cairo',system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      --gold:#C9A84C; --gold-dark:#a97b0f; --gold-light:#d7b96a; --text:#eaf0fb; --text2:#b5c1d1; --text3:#7f8aa0; --dark2:#071325; --dark4:#0d1b2d; --border2:rgba(255,255,255,.07); --radius-sm:14px;
    }
    html,body{height:100%}
    body{ margin:0; font-family:var(--font-main); background:radial-gradient(1200px 500px at 70% -10%, rgba(201,168,76,.12), transparent 60%), radial-gradient(900px 450px at 0% 20%, rgba(78,121,210,.10), transparent 60%), #050c16; color:var(--text); }
    .shell{max-width:1100px;margin:0 auto;padding:28px 16px 46px}
    .actions{display:flex;justify-content:center;gap:10px;margin:0 auto 18px}
    .actions .btn{min-width:180px}
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px; height:42px;padding:0 16px;border-radius:16px; border:1px solid rgba(255,255,255,.10); background:rgba(255,255,255,.03); color:var(--text); font-family:var(--font-main); font-weight:900;font-size:12.5px; cursor:pointer;transition:transform .15s ease, background .2s ease, border-color .2s ease, box-shadow .2s ease;}
    .btn:hover{transform:translateY(-1px);background:rgba(255,255,255,.05);border-color:rgba(255,255,255,.16);box-shadow:0 16px 34px rgba(0,0,0,.20)}
    .btn-gold{background:linear-gradient(135deg,var(--gold-light),var(--gold));border:none;color:#081425}
    .preview-paper{ --preview-color:#C9A84C;--preview-text:#24314d;--preview-bg:#ffffff; width:100%;max-width:724px;margin:0 auto; background:#ffffff; border-radius:24px;padding:34px 28px 22px;min-height:400px;color:var(--preview-text); font-family:var(--font-main);font-size:11px;position:relative;overflow:hidden; box-shadow:0 10px 26px rgba(15,23,42,.08),0 1px 4px rgba(15,23,42,.03); border:1px solid rgba(15,30,63,.05) }
    .preview-watermark{position:absolute;top:50%;right:-4%;transform:translateY(-50%) rotate(-34deg);font-size:76px;font-weight:900;letter-spacing:6px;color:rgba(15,30,63,.06);white-space:nowrap;pointer-events:none;user-select:none;z-index:0;text-transform:uppercase;}
    .preview-header{position:relative;z-index:1;display:grid;grid-template-columns:110px 1fr;align-items:start;gap:16px;padding-top:2px;padding-bottom:22px;margin-bottom:18px;border-bottom:1.5px solid rgba(201,168,76,.78);direction:ltr}
    .preview-header-company,.preview-header-logo{direction:rtl; text-align:right;}
    .preview-logo-frame{width:88px;height:88px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:#fff;border:3px solid rgba(201,168,76,.92);}
    .preview-logo{width:68px;height:68px;object-fit:contain;}
    .preview-company{font-size:27px;font-weight:900;color:#0f1d3c;line-height:1.1}
    .preview-slogan{font-size:13px;color:#7a8090;margin-top:6px;font-weight:600}
    .preview-table-wrap{border:1px solid rgba(16,33,68,.07);border-radius:18px;overflow:hidden;background:#fff}
    .preview-table{width:100%;border-collapse:separate;border-spacing:0;}
    .preview-table thead tr{background:linear-gradient(90deg,#07162e 0%,#0a1d3b 52%,#10254a 100%)}
    .preview-table th{color:#fff;padding:14px 16px;font-size:13px;text-align:right;font-weight:800;}
    .preview-table td{padding:13px 13px;border-bottom:1px solid #edf0f5;font-size:12.5px;color:#24314d;}
    .preview-summary{display:flex;justify-content:flex-end;margin-top:12px}
    .preview-totals{width:314px;border:1px solid rgba(16,33,68,.08);border-radius:14px;overflow:hidden;background:#fff;}
    .preview-total-row{display:flex;justify-content:space-between;padding:11px 15px;font-size:13px;color:#1f2b46;border-bottom:1px solid #eceff5;font-weight:800}
    .preview-total-final{display:flex;justify-content:space-between;padding:13px 15px;font-size:16px;font-weight:900;color:#fff;background:linear-gradient(90deg,#a97b0f,#c89422);}
    .preview-footer{text-align:center;font-size:11.5px;color:#61697b;margin-top:20px;padding-top:14px;border-top:1px solid rgba(201,168,76,.74);font-weight:600}
  </style>
</head>
<body>
  <div class="shell">
    <div class="actions no-print">
      <button class="btn btn-gold" onclick="copyInvoiceImage()"><i class="fas fa-copy"></i> نسخ الفاتورة</button>
    </div>

    <section id="invoice-preview">
      <div class="preview-paper" id="preview-paper">
        <div class="preview-watermark" id="prev-watermark">Infinity Laser</div>
        <div class="preview-header">
          <div class="preview-header-logo">
            <div class="preview-logo-frame">
              <img class="preview-logo" src="https://raw.githubusercontent.com/DrIslambinalkhattab/Infinity/main/Infinity.png" crossorigin="anonymous" alt="logo">
            </div>
          </div>
          <div class="preview-header-company">
            <div class="preview-company">Infinity Laser</div>
            <div class="preview-slogan">دقة لا متناهية لنتائج مثالية</div>
          </div>
        </div>

        <div class="preview-table-wrap">
          <table class="preview-table">
            <thead><tr><th>#</th><th>الخدمة / الوصف</th><th>الكمية</th><th>السعر</th><th>المجموع</th></tr></thead>
            <tbody id="prev-items-body">
              <!-- سيتم ملؤها برمجياً من الإكسيل -->
            </tbody>
          </table>
        </div>

        <div class="preview-summary">
          <div class="preview-totals">
            <div class="preview-total-row"><span>الإجمالي</span><span id="prev-subtotal">0 ج.م</span></div>
            <div class="preview-total-final"><span>الإجمالي النهائي</span><span id="prev-total">0 ج.م</span></div>
          </div>
        </div>

        <div class="preview-footer">
          <div>الفاتورة صالحة لمدة 7 أيام. الدفع نقداً أو بتحويل بنكي.</div>
        </div>
      </div>
    </section>
  </div>

  <script>
    // تهيئة الربط مع Excel عند تحميل الإضافة
    Office.onReady((info) => {
      if (info.host === Office.HostType.Excel) {
        Excel.run(async (context) => {
          let sheet = context.workbook.worksheets.getItem("فواتير");
          
          // الاستماع لأي تغيير يحدث في الشيت لتحديث البيانات لحظياً
          sheet.onChanged.add(onSheetChange);
          
          await context.sync();
          updatePreviewData(); // قراءة البيانات لأول مرة عند الفتح
        });
      }
    });

    async function onSheetChange(event) {
      await updatePreviewData();
    }

    // الدالة الأساسية لسحب البيانات من إكسيل وضخها في الـ HTML
    async function updatePreviewData() {
      Excel.run(async (context) => {
        let sheet = context.workbook.worksheets.getItem("فواتير");
        
        // مثال: جلب البيانات من نطاق معين (عدل النطاق حسب جدولك في شيت فواتير)
        // لنفترض أن عناصر الفاتورة في النطاق من A2 إلى D6
        let range = sheet.getRange("A2:D6");
        range.load("values");
        
        // جلب الإجمالي من خلية محددة مثلاً F2
        let totalCell = sheet.getRange("F2");
        totalCell.load("values");

        await context.sync();

        let data = range.values;
        let totalVal = totalCell.values[0][0];

        // تحديث جدول العناصر في صفحة المعاينة
        let tbody = document.getElementById("prev-items-body");
        tbody.innerHTML = ""; // تفريغ الجدول القديم

        data.forEach((row, index) => {
          if(row[0]) { // التأكد أن الصف ليس فارغاً
            let tr = document.createElement("tr");
            tr.innerHTML = `
              <td>${index + 1}</td>
              <td>${row[0]}</td> <!-- العمود الأول: الوصف -->
              <td>${row[1]}</td> <!-- العمود الثاني: الكمية -->
              <td>${row[2]}</td> <!-- العمود الثالث: السعر -->
              <td>${row[3]}</td> <!-- العمود الرابع: المجموع -->
            `;
            tbody.appendChild(tr);
          }
        });

        // تحديث قيم الإجماليات
        document.getElementById("prev-subtotal").textContent = totalVal + " ج.م";
        document.getElementById("prev-total").textContent = totalVal + " ج.m";
      }).catch((error) => {
        console.error("حدث خطأ أثناء جلب بيانات إكسيل: ", error);
      });
    }

    // كود تحويل الفاتورة لصورة ونسخها كالمعتاد
    async function copyInvoiceImage(){
      const target = document.getElementById('preview-paper');
      if(!target) return;
      try{
        const canvas = await html2canvas(target, { backgroundColor: null, scale: 2, useCORS: true });
        const blob = await new Promise((resolve) => canvas.toBlob(resolve, 'image/png', 1));
        if(navigator.clipboard && window.ClipboardItem){
          await navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
          alert('تم نسخ الفاتورة كصورة بنجاح.');
        }
      }catch(err){
        alert('فشل نسخ الصورة، تأكد من الصلاحيات.');
      }
    }
  </script>
</body>
</html>
